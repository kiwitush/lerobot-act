# ACT 零样本评估 — 未见环境 D
# 加载训练好的 baseline 和 joint 检查点，在环境 D 上评估泛化能力。

experiment:
  name: "act_zero_shot_eval"
  output_dir: "./outputs"

model:
  baseline_checkpoint: "./outputs/checkpoints/act_baseline/best_model.pt"
  joint_checkpoint:    "./outputs/checkpoints/act_joint/best_model.pt"

data:
  eval_repo_id:
    D: "xiaoma26/calvin-lerobot"
  eval_split: "train"
  eval_envs: ["D"]
  eval_local_dir:
    D: "/root/autodl-tmp/calvin/splitD"
  strict_eval_env_filter: false
  eval_env_episode_map_path: null

eval:
  env_name: "D"
  mode: "auto"                 # auto: 先仿真 SuccessRate，失败则回退到离线 Action L1
  num_episodes: 100
  max_steps: 360
  batch_size: 32
  num_workers: 0
  device: "cuda"
  seed: 42
  camera_aliases:
    agentview: "rgb_static"
    eye_in_hand: "rgb_gripper"

# 架构参数必须与训练配置一致
policy:
  camera_names: ["agentview", "eye_in_hand"]
  hidden_dim: 512
  n_encoder_layers: 4
  n_decoder_layers: 7
  nheads: 8
  dim_feedforward: 2048
  dropout: 0.1
  chunk_size: 100
  action_dim: 7
  state_dim: 15
