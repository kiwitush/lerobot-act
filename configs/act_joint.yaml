# ACT 联合训练 — 多环境 (A + B + C)
# 使用与 baseline 完全相同的 ACT 架构和超参数，仅数据来源不同。
# 利用 lerobot/calvin 训练分片中天然包含的 A、B、C 三环境片段。

experiment:
  name: "act_joint"
  project: "lerobot-act"
  seed: 42
  backend: "swanlab"             # "swanlab" (国内推荐) / "wandb" / "none"
  output_dir: "./outputs"

data:
  repo_id: "lerobot/calvin"      # HuggingFace Hub 上的 LeRobot 格式 CALVIN 数据集
  train_envs: ["A", "B", "C"]    # 训练集包含三环境片段
  local_dir: null                # 本地 LeRobot 数据回退路径 (可选)

# 以下参数与 act_baseline.yaml 完全一致 (控制变量)
policy:
  camera_names: ["rgb_static", "rgb_gripper"]
  hidden_dim: 512
  n_encoder_layers: 4
  n_decoder_layers: 7
  nheads: 8
  dim_feedforward: 2048
  dropout: 0.1
  chunk_size: 100
  action_dim: 7
  state_dim: 15

training:
  batch_size: 32
  epochs: 200
  lr: 1.0e-4
  lr_backbone: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  num_workers: 4
  val_every: 5
  save_every: 20
  early_stop_patience: 30

logging:
  log_interval: 50
