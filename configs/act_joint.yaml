# ACT 联合训练 — 多环境 (A + B + C)
# 使用与 baseline 完全相同的 ACT 架构和超参数，仅数据来源不同。
# 利用 lerobot/calvin 训练分片中天然包含的 A、B、C 三环境片段。

experiment:
  name: "act_joint"
  project: "lerobot-act"
  seed: 42
  backend: "swanlab"             # "swanlab" (国内推荐) / "wandb" / "none"
  output_dir: "/root/autodl-tmp/lerobot-act-outputs"

data:
  # 按环境映射: 每个 split 目录是一个独立的 LeRobot 数据集
  repo_id:
    A: "xiaoma26/calvin-lerobot"
    B: "xiaoma26/calvin-lerobot"
    C: "xiaoma26/calvin-lerobot"
  train_envs: ["A", "B", "C"]
  val_envs: ["A", "B", "C"]
  strict_env_filter: false          # 每个 split 已对应一个环境，无需过滤
  env_episode_map_path: null
  val_split_ratio: 0.1              # 从全量数据中划分验证集比例
  local_dir:
    A: "/root/autodl-tmp/calvin/splitA"
    B: "/root/autodl-tmp/calvin/splitB"
    C: "/root/autodl-tmp/calvin/splitC"

# 以下参数与 act_baseline.yaml 完全一致 (控制变量)
policy:
  camera_names: ["agentview", "eye_in_hand"]   # 若与数据集不一致，训练脚本会自动推断覆盖
  hidden_dim: 512
  n_encoder_layers: 4
  n_decoder_layers: 7
  nheads: 8
  dim_feedforward: 2048
  dropout: 0.1
  chunk_size: 100
  action_dim: 7
  state_dim: 15

training:
  batch_size: 32
  epochs: 200
  lr: 1.0e-4
  lr_backbone: 1.0e-5
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  num_workers: 4
  val_every: 5
  save_every: 20
  early_stop_patience: 30

logging:
  log_interval: 50
